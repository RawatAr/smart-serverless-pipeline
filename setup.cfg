[flake8]
max-line-length = 120
ignore =
    # Line too long (handled by max-line-length)
    E501,
    # Line break before binary operator
    W503,
    # Module level import not at top of file (sys.path.insert for shared utils)
    E402,
    # Invalid escape sequence (regex patterns use raw strings but some linters flag them)
    W605
exclude =
    .git,
    __pycache__,
    *.egg-info,
    # Exclude vendored Pillow/PIL installed into Lambda package directory
    lambdas/image_resizer/PIL,
    lambdas/image_resizer/Pillow*,
    lambdas/image_resizer/pillow*
