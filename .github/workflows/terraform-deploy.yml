name: Deploy — Terraform Apply

# Triggered MANUALLY from GitHub Actions UI.
# Go to: Actions → Deploy — Terraform Apply → Run workflow
#
# Required repository secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID        - your AWS IAM access key
#   AWS_SECRET_ACCESS_KEY    - your AWS IAM secret key
#   TF_VAR_alert_email       - your email for SNS alert notifications
#
# Required GitHub Environment:
#   Create an environment named "production" in Settings → Environments

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  PYTHON_VERSION: '3.12'

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Lambda dependencies (Pillow for image resizer)
        run: pip install Pillow -t lambdas/image_resizer/

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        working-directory: terraform
        run: terraform plan -no-color -input=false -var="environment=${{ inputs.environment }}"
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: terraform
        run: terraform apply -auto-approve -input=false -var="environment=${{ inputs.environment }}"
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: terraform
        run: terraform destroy -auto-approve -input=false -var="environment=${{ inputs.environment }}"
        env:
          TF_VAR_alert_email: ${{ secrets.TF_VAR_alert_email }}

      - name: Show Outputs
        if: inputs.action == 'apply'
        working-directory: terraform
        run: terraform output
