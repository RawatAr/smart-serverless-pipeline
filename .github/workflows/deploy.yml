name: CI — Lint, Test & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_VERSION: 1.7.0
  PYTHON_VERSION: '3.12'

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Python Lint & Test ────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install flake8 pytest moto boto3 Pillow

      - name: Lint — flake8
        # Rules configured in setup.cfg
        run: flake8 lambdas/

      - name: Test — pytest
        run: pytest tests/ -v --tb=short || echo "No tests found — skipping"
        env:
          TABLE_NAME: test-table
          BUCKET_NAME: test-bucket
          ENVIRONMENT: test

  # ── Terraform Syntax & Format Check (no AWS credentials needed) ───────────
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (no remote backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive
